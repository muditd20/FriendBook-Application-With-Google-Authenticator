<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>2FA Verification - FriendBook</title>
	<link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .form-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            margin: 60px auto; /* Provides space on top and bottom naturally */
        }
        .form-container h2 {
            margin-top: 0;
            color: #333;
            font-weight: 600;
            font-size: 24px;
        }
        .form-container p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 4px;
        }
        .form-group input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
        .form-group input::placeholder {
            font-weight: 400;
            letter-spacing: normal;
            font-size: 14px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button[type="submit"]:hover {
            background-color: #0056b3;
        }
        button[type="submit"]:active {
            transform: scale(0.98);
        }
        .error {
            color: #d9534f;
            background: #fdf7f7;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #ebccd1;
        }
        a.cancel-link {
            color: #6c757d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        a.cancel-link:hover {
            color: #343a40;
            text-decoration: underline;
        }
    </style>
</head>

<body>
	<div class="form-container">
		<h2>2-Step Verification</h2>
        <p>Please open your Google Authenticator app and enter the code below.</p>

		<div th:if="${error}" class="error" th:text="${error}"></div>

		<form th:action="@{/auth/verify-2fa}" method="post">
			<div class="form-group">
				<label>Authentication Code</label>
				<input type="text" name="code" required autocomplete="off" maxlength="6" pattern="\d{6}" title="Please enter 6 digits" />
			</div>

			<div class="form-group">
				<button type="submit">Verify</button>
			</div>
		</form>

        <p><a class="cancel-link" th:href="@{/auth/login}">Back to Login</a></p>
	</div>
</body>

</html>
